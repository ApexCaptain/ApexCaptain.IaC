version: '3.8'

services:
  workspace:
    container_name: apex_captain_iac_devcon_workspace
    image: mcr.microsoft.com/devcontainers/base:bullseye
    environment:
      TZ: 'Asia/Seoul'
      volumePathsToChangeOwner: ${nodeModulesVolumeContainerPath}
      # Volume Paths
      devContainerTerraformOutputDirPath: ${devContainerTerraformOutputDirPath}

    command: sleep infinity

    env_file:
      - env/tf-cloud.env
      - env/workspace.env
      - env/github.env

    volumes:
      # Workspace Cache
      - ..:${containerWorkspaceFolder}:cached
      # Anonymous Volume
      ## DevContainer env dir generated by terraform
      - ${devContainerTerraformOutputDirPath}:${devContainerTerraformOutputDirPath}
      # Named Volume
      ## Node Modules
      - ApexCaptain.IaC-node_modules:${nodeModulesVolumeContainerPath}

volumes:
  ApexCaptain.IaC-node_modules:
